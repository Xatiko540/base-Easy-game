<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Easy Games">
  <meta name="base:app_id" content="6a4717e9f1384d72d578e41e" />

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Easy Games">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Easy Games</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css" />
  <script>
    // Firebase App Check debug tokens are enabled only for local development.
    // Production Hosting always uses reCAPTCHA Enterprise attestation.
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
      self.FIREBASE_APPCHECK_DEBUG_TOKEN = true;
    }
  </script>
</head>
<body>
  <div id="app-splash" class="app-splash" aria-label="Easy Games loading">
    <div class="app-splash__content">
      <img
        class="app-splash__logo"
        src="assets/assets/branding/easy-games-splash.png"
        alt="Easy Games Smart Game"
      />
      <div class="app-splash__loader" aria-hidden="true"></div>
    </div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      const splash = document.getElementById('app-splash');
      if (!splash) return;
      splash.classList.add('app-splash--hidden');
      window.setTimeout(function () {
        splash.remove();
        document.body.style.overflow = '';
      }, 260);
    });
  </script>
  <script src="flutter_bootstrap.js?v=20260713-1" async></script>

</body>
</html>
